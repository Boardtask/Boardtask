{% extends "app/app_layout.html" %}

{% block title %}Create Project · {{ app_name }}{% endblock %}

{% block app_content %}
<div class="flex flex-col items-center w-full">
    <h1 class="text-3xl font-bold text-charcoal text-center mb-2">Create a Project</h1>
    <p class="text-charcoal/80 text-center mb-8">Kickstart your next big idea with a fresh workspace.</p>

    {% if error != "" %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4 max-w-md w-full">
        {{ error }}
    </div>
    {% endif %}

    <div class="w-full max-w-md rounded-xl bg-white border border-border-subtle shadow-lg shadow-slate-200/50 p-6">
        <form method="post" action="/app/projects" class="space-y-5">
            <div>
                <label for="title" class="block text-sm font-medium text-charcoal mb-1.5">Project Title</label>
                <input
                    type="text"
                    id="title"
                    name="title"
                    value="{{ title }}"
                    required
                    maxlength="255"
                    placeholder="e.g. Q4 Marketing Strategy"
                    class="block w-full px-3 py-2.5 border border-border-subtle rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-charcoal placeholder:text-slate-400"
                >
            </div>
            <div>
                <label for="team_id" class="block text-sm font-medium text-charcoal mb-1.5">Team</label>
                <select
                    id="team_id"
                    name="team_id"
                    required
                    class="block w-full px-3 py-2.5 border border-border-subtle rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-charcoal bg-white"
                >
                    {% for team in teams %}
                    <option value="{{ team.id }}"{% if team.id == selected_team_id %} selected{% endif %}>{{ team.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-lg font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors"
            >
                Create Project
            </button>
        </form>
    </div>

    <p class="text-slate-500 text-xs font-medium mt-6 tracking-wider">STEP 1 OF 3</p>
</div>
{% endblock %}
